<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./sass/style.css">
    <title>ООО "Агентство кадастра и недвижимости"</title>
</head>
<body>
    <header class="header">
        <div class="header__container container">
            <img class="header__link-img" src="./img/logo.png" alt="LOGO">
            <a class="header__link" href="/src/main.html"><b>Главная</b></a>
            <a class="header__link" href="./service.html"><b>Услуги</b></a>
            <a class="header__link" href="./info.html"><b>О нас</b></a>
            <a class="header__link-main" href="./contacts.html"><b>Контакты</b></a>
        </div>
    </header>
    <main class="main__contact">
        <container class="container__contact">
            <div class="contact__info">
                <h1 class="contact__title">Контакты</h1>
                <h2 class="contact__adress">Адрес: 141302, Московская область, <br> г.Сергиев Посад, ул.Стахановская, д.1д, <br> лит.Б, этаж 1, каб.21</h2>
                <p class="contact__text">AKN-SP@MAIL.RU</p>
                <p class="contact__text">+7 (929) 997-82-61</p>
            </div>
            <div class="contact__form">
                <form class="container__form" id="feedback">
                    <h1 class="form__textarea-title">Оставьте свою заявку</h1>
                    <input class="form__textarea" type="text" name="username" id="username" placeholder="Введите ваше имя">
                    <input class="form__textarea" type="text" name="phone" id="phone" placeholder="Введите ваш номер телефона">
                    <input class="form__textarea" type="text" name="email" id="email" placeholder="Введите ваш e-mail">
                    <input class="form__textarea" type="text" name="message" id="message" placeholder="Сообщение">
                    <input class="form__textarea-button" type="submit" name="submit" id="submit" value="Отправить">
                </form>
            </div>
        </container>
    </main>
    <footer class="footer">
        <div class="footer__info">
            <img src="./img/logo.png" alt="LOGO" class="footer__logo">
            <p class="footer__text">8 (929) 997-82-61</p>
            <p class="footer__text">akn-sp@mail.ru</p>
        </div>
        <p class="footer__name">ООО «Агентство кадастра и недвижимости»</p>
    </footer>
</body>
</html>
